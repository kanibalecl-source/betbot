<!DOCTYPE html>
<html><head><title>ANALIZA GPT</title>
<style>
body {background:#111;color:white;font-family:Arial;padding:20px;}
.card {background:#1d1d1d;padding:20px;margin-bottom:20px;border-radius:10px;}
.green{color:#00ff88;}.red{color:#ff4d4d;}
</style></head><body>
<h1>ANALIZA GPT</h1>
<div id="matches"></div>
<script>
fetch('/api/gpt-analysis')
.then(r=>r.json())
.then(data=>{
let html='';
data.matches.forEach(match=>{
html += `
<div class="card">
<h2>${match.match}</h2>
<p><b>Typ:</b> ${match.bet}</p>
<p><b>Confidence:</b> ${match.confidence}%</p>
<p><b>Value:</b> ${match.value}</p>
<p><b>Risk:</b> ${match.risk}</p>
<p><b>Status:</b> <span class="${match.status === 'PLAY' ? 'green' : 'red'}">${match.status}</span></p>
<hr><p>${match.analysis}</p></div>`;
});
html += '<h2>SAFE AKO</h2>';
data.ako.safe.forEach(pick=>{html += `<div class="card">${pick}</div>`;});
document.getElementById('matches').innerHTML=html;
});
</script></body></html>
