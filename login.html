<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanibal Analytics - Login</title>
  <link rel="icon" type="image/x-icon" href="kanibal_icon_new.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(circle at top right,rgba(64,255,76,.18),transparent 35%),
        radial-gradient(circle at top left,rgba(255,128,0,.08),transparent 30%),
        linear-gradient(135deg,#040607 0%,#07110c 40%,#020303 100%);
      overflow:hidden;position:relative;color:white;
    }
    body:before{
      content:"";position:absolute;inset:0;
      background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
      background-size:40px 40px;opacity:.25;pointer-events:none;
    }
    .glow{position:absolute;width:500px;height:500px;border-radius:50%;
      background:radial-gradient(circle,rgba(89,255,55,.16),transparent 70%);
      top:-180px;right:-180px;z-index:0;pointer-events:none}
    .login-wrapper{width:100%;max-width:470px;position:relative;z-index:2}
    .top-panel{
      background:linear-gradient(180deg,rgba(9,17,14,.96),rgba(5,9,7,.96));
      border:1px solid rgba(85,255,85,.22);border-radius:28px;
      padding:34px 32px 26px;text-align:center;
      box-shadow:0 0 50px rgba(81,255,81,.08),inset 0 0 0 1px rgba(255,255,255,.03);
      margin-bottom:18px;backdrop-filter:blur(12px);
    }
    .logo{width:74px;height:74px;object-fit:contain;margin-bottom:20px;
      filter:drop-shadow(0 0 20px rgba(0,255,100,.25))}
    .brand{
      font-size:48px;font-weight:900;letter-spacing:.06em;margin-bottom:14px;line-height:1;
      background:linear-gradient(90deg,#fff,#baffc5);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .subtitle{color:#7dff42;letter-spacing:.38em;font-size:13px;font-weight:800;text-transform:uppercase}
    .login-panel{
      background:linear-gradient(180deg,rgba(6,10,11,.98),rgba(2,4,4,.98));
      border-radius:22px;border:1px solid rgba(255,255,255,.05);
      padding:28px;box-shadow:0 0 30px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .input-group{margin-bottom:22px}
    .input-group label{display:block;margin-bottom:10px;color:#8fa39a;font-size:14px;font-weight:700;letter-spacing:.04em}
    .input-wrapper input{
      width:100%;height:58px;border-radius:16px;border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);color:white;font-size:16px;padding:0 18px;
      transition:all .25s ease;outline:none;
    }
    .input-wrapper input:focus{border-color:rgba(125,255,66,.55);box-shadow:0 0 18px rgba(125,255,66,.12);background:rgba(255,255,255,.045)}
    .input-wrapper input::placeholder{color:#6e7d77}
    .login-btn{
      width:100%;height:58px;border:none;border-radius:16px;
      background:linear-gradient(90deg,#59ff37,#97ff3f);color:#051008;
      font-size:16px;font-weight:900;letter-spacing:.08em;cursor:pointer;
      transition:all .22s ease;box-shadow:0 0 24px rgba(125,255,66,.18);
    }
    .login-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(125,255,66,.28)}
    .bottom-text{margin-top:18px;text-align:center;color:#61736a;font-size:12px;letter-spacing:.08em}
    @media(max-width:600px){
      .login-wrapper{padding:0 18px}.brand{font-size:36px}.subtitle{letter-spacing:.22em;font-size:11px}
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="login-wrapper">
    <div class="top-panel">
      <img src="kanibal_login_logo.png" alt="Kanibal Analytics" class="logo">
      <div class="brand">KANIBAL ANALYTICS</div>
      <div class="subtitle">Zamknięty Panel Dostępu</div>
    </div>
    <div class="login-panel">
      <div class="input-group">
        <label>Nazwa użytkownika</label>
        <div class="input-wrapper"><input type="text" placeholder="Wprowadź login"></div>
      </div>
      <div class="input-group">
        <label>Hasło</label>
        <div class="input-wrapper"><input type="password" placeholder="Wprowadź hasło"></div>
      </div>
      <button class="login-btn">Zaloguj</button>
      <div class="bottom-text">KANIBAL ANALYTICS • AI FOOTBALL INTELLIGENCE</div>
    </div>
  </div>
</body>
</html>
