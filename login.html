<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanibal Analytics Login</title>
<link rel="icon" type="image/x-icon" href="kanibal_icon_new.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top right,rgba(64,255,76,.18),transparent 35%),
radial-gradient(circle at top left,rgba(255,128,0,.08),transparent 30%),
linear-gradient(135deg,#040607 0%,#07110c 40%,#020303 100%);
overflow:hidden;
color:#fff;
}
body:before{
content:"";
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
background-size:40px 40px;
opacity:.25;
}
.glow{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,rgba(89,255,55,.16),transparent 70%);
top:-180px;
right:-180px;
}
.wrapper{
width:100%;
max-width:520px;
position:relative;
z-index:2;
padding:20px;
}
.hero{
background:linear-gradient(180deg,rgba(9,17,14,.96),rgba(5,9,7,.96));
border:1px solid rgba(85,255,85,.22);
border-radius:28px;
padding:34px 32px 28px;
text-align:center;
box-shadow:0 0 50px rgba(81,255,81,.08), inset 0 0 0 1px rgba(255,255,255,.03);
margin-bottom:18px;
}
.logo-box{
width:128px;
height:128px;
margin:0 auto 26px;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.03);
border:1px solid rgba(125,255,66,.18);
box-shadow:0 0 40px rgba(125,255,66,.12), inset 0 0 0 1px rgba(255,255,255,.03);
}
.logo{
width:92px;
height:92px;
object-fit:contain;
filter:drop-shadow(0 0 28px rgba(0,255,120,.35));
}
.brand{
font-size:48px;
font-weight:900;
letter-spacing:.05em;
margin-bottom:14px;
background:linear-gradient(90deg,#fff,#baffc5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.sub{
color:#7dff42;
letter-spacing:.35em;
font-size:13px;
font-weight:800;
text-transform:uppercase;
}
.panel{
background:linear-gradient(180deg,rgba(6,10,11,.98),rgba(2,4,4,.98));
border-radius:22px;
border:1px solid rgba(255,255,255,.05);
padding:28px;
}
.group{margin-bottom:22px}
.group label{
display:block;
margin-bottom:10px;
color:#8fa39a;
font-size:14px;
font-weight:700;
}
.input{
width:100%;
height:58px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.03);
color:white;
font-size:16px;
padding:0 18px;
outline:none;
}
.input:focus{
border-color:rgba(125,255,66,.55);
box-shadow:0 0 18px rgba(125,255,66,.12);
}
.btn{
width:100%;
height:58px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#59ff37,#97ff3f);
color:#051008;
font-size:16px;
font-weight:900;
letter-spacing:.08em;
cursor:pointer;
box-shadow:0 0 24px rgba(125,255,66,.18);
}
.footer{
margin-top:18px;
text-align:center;
color:#61736a;
font-size:12px;
letter-spacing:.08em;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrapper">
<div class="hero">
<div class="logo-box">
<img src="kanibal_logo.png" class="logo">
</div>
<div class="brand">KANIBAL ANALYTICS</div>
<div class="sub">Zamknięty Panel Dostępu</div>
</div>

<div class="panel">
<div class="group">
<label>Nazwa użytkownika</label>
<input class="input" type="text" placeholder="Wprowadź login">
</div>

<div class="group">
<label>Hasło</label>
<input class="input" type="password" placeholder="Wprowadź hasło">
</div>

<button class="btn">Zaloguj</button>

<div class="footer">
KANIBAL ANALYTICS • AI FOOTBALL INTELLIGENCE
</div>
</div>
</div>
</body>
</html>
