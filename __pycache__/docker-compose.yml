services:
  betbot-web:
    build: .
    container_name: betbot-web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  betbot-loop:
    build: .
    container_name: betbot-loop
    restart: always
    command: python bot_loop.py
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  betbot-settle:
    build: .
    container_name: betbot-settle
    restart: always
    command: python settle_loop.py
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
